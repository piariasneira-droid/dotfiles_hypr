# =====================================================
# ROSÉ PINE — Master Color Source
# ~/Themes/rose-pine.conf
#
# THIS is the only file you edit to change colors.
# After editing run:  bash ~/Themes/generate.sh --theme rose-pine.conf
# =====================================================

# ── Meta ──────────────────────────────────────────────
THEME_NAME="Rosé Pine"
THEME_VERSION="1.0"

# ── Base surfaces ──────────────────────────────────────
BG0="191724"      # base      — deepest bg, bar bg
BG1="1f1d2e"      # surface   — notification/panel bg
BG2="26233a"      # overlay   — popups, cards
BG3="403d52"      # muted     — borders, elevated

# ── Text ───────────────────────────────────────────────
FG0="e0def4"      # text      — primary text
FG1="908caa"      # subtle    — muted/secondary text

# ── Accents ────────────────────────────────────────────
ACCENT0="ebbcba"    # rose     — PRIMARY accent
ACCENT1="eb6f92"    # love     — darker (buttons, borders)
ACCENT2="c4a7e7"    # iris     — mid (hover, placeholder)
ACCENT_SEC="9ccfd8" # foam     — secondary accent

# ── Semantic ───────────────────────────────────────────
ORANGE="f6c177"   # gold  — warnings
RED="eb6f92"      # love  — errors / urgent
YELLOW="f6c177"   # gold  — optional warm accent

# ── Rofi-specific ─────────────────────────────────────
ROFI_LIGHT_CONTRAST="e0def4"        # text — selected text contrast pop
ROFI_ENTRY_BG="235, 188, 186, 0.1"  # entry field background tint
ROFI_PLACEHOLDER="Search the garden..."
ROFI_GRAD_DARK="b4637a"             # gradient mid stop
ROFI_GRAD_DARKER="7a3a4a"           # gradient dark stop

# ── Waybar-specific ───────────────────────────────────
WB_BACKGROUND="0, 0, 0, 0"
WB_ON_SURFACE="ffffff"              # white icons on dark bar
WB_TOOLTIP_BG="0, 0, 0, 0.9"
WB_PRIMARY="eb6f92"
WB_PRIMARY_CONTAINER="235, 111, 146, 0.2"
WB_WORKSPACE_HOVER="ebbcba"
WB_WARNING="f6c177"
WB_ERROR="eb6f92"

# ── Transparency ──────────────────────────────────────
BG0_A90="25, 23, 36, 0.90"
BG0_A95="25, 23, 36, 0.95"
BG2_A80="38, 35, 58, 0.80"
ACCENT0_A15="235, 188, 186, 0.15"
ACCENT0_A18="235, 188, 186, 0.18"
ACCENT1_A30="235, 111, 146, 0.30"
