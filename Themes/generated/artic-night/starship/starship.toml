# =====================================================
# Artic Night ŌĆö Starship Prompt
# AUTO-GENERATED ŌĆö do not edit manually.
# Edit artic-night.conf and re-run generate.sh
# =====================================================

palette = "artic-night"

format = """
$username$directory$git_branch$git_status$git_state$python$nodejs$rust$golang$cmd_duration$jobs$status
$character"""

add_newline = false

[username]
format     = "[$user ]($style)"
style_user = "bold fg:#d8dee9"
style_root = "bold fg:#bf616a"
show_always = true

[directory]
format            = "[  $path ]($style)"
style             = "bold fg:#88c0d0"
truncation_length = 4
truncate_to_repo  = true
read_only         = "  "
read_only_style   = "fg:#bf616a"

[directory.substitutions]
"~/Documentos" = "¾░łÖ Docs"
"~/Imagenes"   = "¾░ŗ® Imgs"
"~"            = "¾▒éĄ ~"

[git_branch]
format = "[ $symbol$branch ]($style)"
symbol = " "
style  = "bold fg:#81a1c1"

[git_status]
format    = "([$all_status$ahead_behind ]($style))"
style     = "bold fg:#d08770"
ahead     = "ŌćĪ${count}"
behind    = "ŌćŻ${count}"
diverged  = "ŌćĢŌćĪ${ahead_count}ŌćŻ${behind_count}"
modified  = "!${count}"
untracked = "?${count}"
staged    = "+${count}"
deleted   = "Ō£ś${count}"
stashed   = "ŌēĪ"

[git_state]
format = "([$state( $progress_current/$progress_total)]($style)) "
style  = "fg:#d08770"

[python]
format       = "[ ${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)"
symbol       = " "
style        = "fg:#81a1c1"
detect_files = ["requirements.txt", "pyproject.toml", ".python-version", "setup.py"]

[nodejs]
format       = "[ $symbol($version )]($style)"
symbol       = " "
style        = "fg:#88c0d0"
detect_files = ["package.json", ".nvmrc"]

[rust]
format       = "[ $symbol($version )]($style)"
symbol       = " "
style        = "fg:#d08770"
detect_files = ["Cargo.toml"]

[golang]
format       = "[ $symbol($version )]($style)"
symbol       = " "
style        = "fg:#81a1c1"
detect_files = ["go.mod"]

[cmd_duration]
format            = "[ ¾▒”¤ $duration ]($style)"
style             = "fg:#8896a8"
min_time          = 2000
show_milliseconds = false

[jobs]
format    = "[ $symbol$number ]($style)"
symbol    = " "
style     = "fg:#ebcb8b"
threshold = 1

[status]
format   = "[ $symbol$status ]($style)"
symbol   = " "
style    = "fg:#bf616a"
disabled = false

[character]
success_symbol = "[ŌØ»](bold fg:#88c0d0)"
error_symbol   = "[ŌØ»](bold fg:#bf616a)"
vimcmd_symbol  = "[ŌØ«](bold fg:#81a1c1)"

[palettes.artic-night]
bg0        = "#1e2430"
bg1        = "#242d3d"
bg2        = "#2e3a50"
bg3        = "#3b4a63"
fg0        = "#d8dee9"
fg1        = "#8896a8"
accent0    = "#88c0d0"
accent1    = "#4a7fa5"
accent2    = "#5e9fc9"
accent-sec = "#81a1c1"
orange     = "#d08770"
red        = "#bf616a"
yellow     = "#ebcb8b"
