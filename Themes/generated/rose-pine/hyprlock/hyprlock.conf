# =====================================================
# Rosé Pine — Hyprlock Config
# AUTO-GENERATED — do not edit manually.
# Edit rose-pine.conf and re-run generate.sh
# =====================================================

general {
    disable_loading_bar = false
    hide_cursor         = true
    grace               = 0
    no_fade_in          = false
}

# ── Background ────────────────────────────────────────
background {
    monitor     =
    path        = /home/pivan/Themes/wallpapers/active
    blur_passes = 0
    brightness  = 1.0
    contrast    = 1.0
    vibrancy    = 0.0
}

# ── Clock ─────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H:%M")"
    color       = rgb(e0def4)
    font_size   = 72
    font_family = JetBrainsMono Nerd Font Bold

    position = 0, 120
    halign   = center
    valign   = center
}

label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color       = rgb(908caa)
    font_size   = 20
    font_family = JetBrainsMono Nerd Font

    position = 0, 40
    halign   = center
    valign   = center
}

# ── Password input ────────────────────────────────────
input-field {
    monitor  =
    size     = 280, 52

    outline_thickness = 2
    dots_size         = 0.26
    dots_spacing      = 0.18
    dots_center       = true

    outer_color       = rgb(eb6f92)
    inner_color       = rgb(1f1d2e)
    font_color        = rgb(e0def4)
    fade_on_empty     = true

    check_color       = rgb(c4a7e7)
    fail_color        = rgb(eb6f92)

    placeholder_text  = <i>password…</i>
    fail_text         = <i>incorrect</i>

    position = 0, -80
    halign   = center
    valign   = center
}

# ── User label ────────────────────────────────────────
label {
    monitor     =
    text        = $USER
    color       = rgb(908caa)
    font_size   = 14
    font_family = JetBrainsMono Nerd Font

    position = 0, -140
    halign   = center
    valign   = center
}
