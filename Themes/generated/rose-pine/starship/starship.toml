# =====================================================
# Ros├® Pine ÔÇö Starship Prompt
# AUTO-GENERATED ÔÇö do not edit manually.
# Edit rose-pine.conf and re-run generate.sh
# =====================================================

palette = "rose-pine"

format = """
$username$directory$git_branch$git_status$git_state$python$nodejs$rust$golang$cmd_duration$jobs$status
$character"""

add_newline = false

[username]
format     = "[$user ]($style)"
style_user = "bold fg:#e0def4"
style_root = "bold fg:#eb6f92"
show_always = true

[directory]
format            = "[  $path ]($style)"
style             = "bold fg:#ebbcba"
truncation_length = 4
truncate_to_repo  = true
read_only         = "  "
read_only_style   = "fg:#eb6f92"

[directory.substitutions]
"~/Documentos" = "¾░êÖ Docs"
"~/Imagenes"   = "¾░ï® Imgs"
"~"            = "¾▒éÁ ~"

[git_branch]
format = "[ $symbol$branch ]($style)"
symbol = " "
style  = "bold fg:#9ccfd8"

[git_status]
format    = "([$all_status$ahead_behind ]($style))"
style     = "bold fg:#f6c177"
ahead     = "Ôçí${count}"
behind    = "Ôçú${count}"
diverged  = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
modified  = "!${count}"
untracked = "?${count}"
staged    = "+${count}"
deleted   = "Ô£ÿ${count}"
stashed   = "Ôëí"

[git_state]
format = "([$state( $progress_current/$progress_total)]($style)) "
style  = "fg:#f6c177"

[python]
format       = "[ ${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)"
symbol       = " "
style        = "fg:#9ccfd8"
detect_files = ["requirements.txt", "pyproject.toml", ".python-version", "setup.py"]

[nodejs]
format       = "[ $symbol($version )]($style)"
symbol       = " "
style        = "fg:#ebbcba"
detect_files = ["package.json", ".nvmrc"]

[rust]
format       = "[ $symbol($version )]($style)"
symbol       = " "
style        = "fg:#f6c177"
detect_files = ["Cargo.toml"]

[golang]
format       = "[ $symbol($version )]($style)"
symbol       = " "
style        = "fg:#9ccfd8"
detect_files = ["go.mod"]

[cmd_duration]
format            = "[ ¾▒ªƒ $duration ]($style)"
style             = "fg:#908caa"
min_time          = 2000
show_milliseconds = false

[jobs]
format    = "[ $symbol$number ]($style)"
symbol    = " "
style     = "fg:#f6c177"
threshold = 1

[status]
format   = "[ $symbol$status ]($style)"
symbol   = " "
style    = "fg:#eb6f92"
disabled = false

[character]
success_symbol = "[ÔØ»](bold fg:#ebbcba)"
error_symbol   = "[ÔØ»](bold fg:#eb6f92)"
vimcmd_symbol  = "[ÔØ«](bold fg:#9ccfd8)"

[palettes.rose-pine]
bg0        = "#191724"
bg1        = "#1f1d2e"
bg2        = "#26233a"
bg3        = "#403d52"
fg0        = "#e0def4"
fg1        = "#908caa"
accent0    = "#ebbcba"
accent1    = "#eb6f92"
accent2    = "#c4a7e7"
accent-sec = "#9ccfd8"
orange     = "#f6c177"
red        = "#eb6f92"
yellow     = "#f6c177"
