# =====================================================
# Catppuccin Mocha — Starship Prompt
# AUTO-GENERATED — do not edit manually.
# Edit catppuccin-mocha.conf and re-run generate.sh
# =====================================================

palette = "catppuccin-mocha"

format = """
$username$directory$git_branch$git_status$git_state$python$nodejs$rust$golang$cmd_duration$jobs$status
$character"""

add_newline = false

[username]
format     = "[$user ]($style)"
style_user = "bold fg:#cdd6f4"
style_root = "bold fg:#f38ba8"
show_always = true

[directory]
format            = "[  $path ]($style)"
style             = "bold fg:#cba6f7"
truncation_length = 4
truncate_to_repo  = true
read_only         = "  "
read_only_style   = "fg:#f38ba8"

[directory.substitutions]
"~/Documentos" = "󰈙 Docs"
"~/Imagenes"   = "󰋩 Imgs"
"~"            = "󱂵 ~"

[git_branch]
format = "[ $symbol$branch ]($style)"
symbol = " "
style  = "bold fg:#89dceb"

[git_status]
format    = "([$all_status$ahead_behind ]($style))"
style     = "bold fg:#fab387"
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕⇡${ahead_count}⇣${behind_count}"
modified  = "!${count}"
untracked = "?${count}"
staged    = "+${count}"
deleted   = "✘${count}"
stashed   = "≡"

[git_state]
format = "([$state( $progress_current/$progress_total)]($style)) "
style  = "fg:#fab387"

[python]
format       = "[ ${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)"
symbol       = " "
style        = "fg:#89dceb"
detect_files = ["requirements.txt", "pyproject.toml", ".python-version", "setup.py"]

[nodejs]
format       = "[ $symbol($version )]($style)"
symbol       = " "
style        = "fg:#cba6f7"
detect_files = ["package.json", ".nvmrc"]

[rust]
format       = "[ $symbol($version )]($style)"
symbol       = " "
style        = "fg:#fab387"
detect_files = ["Cargo.toml"]

[golang]
format       = "[ $symbol($version )]($style)"
symbol       = " "
style        = "fg:#89dceb"
detect_files = ["go.mod"]

[cmd_duration]
format            = "[ 󱦟 $duration ]($style)"
style             = "fg:#a6adc8"
min_time          = 2000
show_milliseconds = false

[jobs]
format    = "[ $symbol$number ]($style)"
symbol    = " "
style     = "fg:#f9e2af"
threshold = 1

[status]
format   = "[ $symbol$status ]($style)"
symbol   = " "
style    = "fg:#f38ba8"
disabled = false

[character]
success_symbol = "[❯](bold fg:#cba6f7)"
error_symbol   = "[❯](bold fg:#f38ba8)"
vimcmd_symbol  = "[❮](bold fg:#89dceb)"

[palettes.catppuccin-mocha]
bg0        = "#1e1e2e"
bg1        = "#181825"
bg2        = "#313244"
bg3        = "#45475a"
fg0        = "#cdd6f4"
fg1        = "#a6adc8"
accent0    = "#cba6f7"
accent1    = "#89b4fa"
accent2    = "#b4befe"
accent-sec = "#89dceb"
orange     = "#fab387"
red        = "#f38ba8"
yellow     = "#f9e2af"
