# =====================================================
# Rosé Pine Dawn — Starship Prompt
# AUTO-GENERATED — do not edit manually.
# Edit rose-pine-dawn.conf and re-run generate.sh
# =====================================================

palette = "rose-pine-dawn"

format = """
$username$directory$git_branch$git_status$git_state$python$nodejs$rust$golang$cmd_duration$jobs$status
$character"""

add_newline = false

[username]
format     = "[$user ]($style)"
style_user = "bold fg:#575279"
style_root = "bold fg:#b4637a"
show_always = true

[directory]
format            = "[  $path ]($style)"
style             = "bold fg:#d7827e"
truncation_length = 4
truncate_to_repo  = true
read_only         = "  "
read_only_style   = "fg:#b4637a"

[directory.substitutions]
"~/Documentos" = "󰈙 Docs"
"~/Imagenes"   = "󰋩 Imgs"
"~"            = "󱂵 ~"

[git_branch]
format = "[ $symbol$branch ]($style)"
symbol = " "
style  = "bold fg:#56949f"

[git_status]
format    = "([$all_status$ahead_behind ]($style))"
style     = "bold fg:#ea9d34"
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕⇡${ahead_count}⇣${behind_count}"
modified  = "!${count}"
untracked = "?${count}"
staged    = "+${count}"
deleted   = "✘${count}"
stashed   = "≡"

[git_state]
format = "([$state( $progress_current/$progress_total)]($style)) "
style  = "fg:#ea9d34"

[python]
format       = "[ ${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)"
symbol       = " "
style        = "fg:#56949f"
detect_files = ["requirements.txt", "pyproject.toml", ".python-version", "setup.py"]

[nodejs]
format       = "[ $symbol($version )]($style)"
symbol       = " "
style        = "fg:#d7827e"
detect_files = ["package.json", ".nvmrc"]

[rust]
format       = "[ $symbol($version )]($style)"
symbol       = " "
style        = "fg:#ea9d34"
detect_files = ["Cargo.toml"]

[golang]
format       = "[ $symbol($version )]($style)"
symbol       = " "
style        = "fg:#56949f"
detect_files = ["go.mod"]

[cmd_duration]
format            = "[ 󱦟 $duration ]($style)"
style             = "fg:#9893a5"
min_time          = 2000
show_milliseconds = false

[jobs]
format    = "[ $symbol$number ]($style)"
symbol    = " "
style     = "fg:#ea9d34"
threshold = 1

[status]
format   = "[ $symbol$status ]($style)"
symbol   = " "
style    = "fg:#b4637a"
disabled = false

[character]
success_symbol = "[❯](bold fg:#d7827e)"
error_symbol   = "[❯](bold fg:#b4637a)"
vimcmd_symbol  = "[❮](bold fg:#56949f)"

[palettes.rose-pine-dawn]
bg0        = "#faf4ed"
bg1        = "#fffaf3"
bg2        = "#f2e9e1"
bg3        = "#dfdad9"
fg0        = "#575279"
fg1        = "#9893a5"
accent0    = "#d7827e"
accent1    = "#b4637a"
accent2    = "#907aa9"
accent-sec = "#56949f"
orange     = "#ea9d34"
red        = "#b4637a"
yellow     = "#ea9d34"
