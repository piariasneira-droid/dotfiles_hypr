# =====================================================
# Evergreen Forest — Foot Terminal Config
# AUTO-GENERATED — do not edit manually.
# Edit evergreen.conf and re-run generate.sh
# =====================================================

# Font configuration
font=Iosevka Nerd Font:size=10
pad=12x12

[cursor]
style=block
blink=no
# In the [cursor] section, Foot wants: color=<foreground-hex> <background-hex>
# NO '#' prefix here

[colors]
alpha=0.95
# Foot [colors] section expects raw hex (NO '#')
background=1a2421
foreground=d3c6aa
cursor=1a2421 d3c6aa

## Normal colors
regular0=3d4f49       # black
regular1=e67e80       # red
regular2=a7c080    # green
regular3=dbbc7f    # yellow
regular4=83c092      # blue
regular5=83c092    # magenta
regular6=4f772d    # cyan
regular7=9da9a0       # white

## Bright colors
bright0=2d3b36        # bright black
bright1=e67e80        # bright red
bright2=90a955     # bright green
bright3=e69875     # bright yellow/orange
bright4=83c092       # bright blue
bright5=83c092    # bright magenta
bright6=4f772d     # bright cyan
bright7=d3c6aa        # bright white

[csd]
preferred=server
size=0

