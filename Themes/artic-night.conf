# =====================================================
# ARTIC NIGHT — Master Color Source
# ~/Themes/artic-night.conf
#
# THIS is the only file you edit to change colors.
# After editing run:  bash ~/Themes/generate.sh --theme artic-night.conf
# =====================================================

# ── Meta ──────────────────────────────────────────────
THEME_NAME="Artic Night"
THEME_VERSION="1.0"

# ── Base surfaces ──────────────────────────────────────
BG0="1e2430"      # polar night    — deepest bg, bar bg
BG1="242d3d"      # deep ice       — notification/panel bg
BG2="2e3a50"      # glacier shadow — popups, cards
BG3="3b4a63"      # frost shelf    — borders, elevated

# ── Text ───────────────────────────────────────────────
FG0="d8dee9"      # snow white  — primary text
FG1="8896a8"      # frozen mist — muted/secondary text

# ── Accents ────────────────────────────────────────────
ACCENT0="88c0d0"    # arctic water — PRIMARY accent
ACCENT1="4a7fa5"    # deep fjord   — darker (buttons, borders)
ACCENT2="5e9fc9"    # glacial lake — mid (hover, placeholder)
ACCENT_SEC="81a1c1" # frost haze   — secondary accent

# ── Semantic ───────────────────────────────────────────
ORANGE="d08770"   # aurora red   — warnings
RED="bf616a"      # frozen ember — errors / urgent
YELLOW="ebcb8b"   # tundra gold  — optional warm accent

# ── Rofi-specific ─────────────────────────────────────
ROFI_LIGHT_CONTRAST="e5eef7"         # bright ice — selected text contrast pop
ROFI_ENTRY_BG="39, 74, 127, 0.2"    # entry field background tint
ROFI_PLACEHOLDER="Search the tundra..."
ROFI_GRAD_DARK="2e527a"              # gradient mid stop
ROFI_GRAD_DARKER="1a2e45"           # gradient dark stop

# ── Waybar-specific ───────────────────────────────────
WB_BACKGROUND="0, 0, 0, 0"
WB_ON_SURFACE="ffffff"
WB_TOOLTIP_BG="0, 0, 0, 0.9"
WB_PRIMARY="4a7fa5"
WB_PRIMARY_CONTAINER="136, 192, 208, 0.2"
WB_WORKSPACE_HOVER="88c0d0"
WB_WARNING="d08770"
WB_ERROR="bf616a"

# ── Transparency ──────────────────────────────────────
BG0_A90="30, 36, 48, 0.90"
BG0_A95="30, 36, 48, 0.95"
BG2_A80="46, 58, 80, 0.80"
ACCENT0_A15="136, 192, 208, 0.15"
ACCENT0_A18="136, 192, 208, 0.18"
ACCENT1_A30="74, 127, 165, 0.30"
