# =====================================================
# CATPPUCCIN LATTE — Master Color Source
# ~/Themes/catppuccin-latte.conf
#
# THIS is the only file you edit to change colors.
# After editing run:  bash ~/Themes/generate.sh --theme catppuccin-latte.conf
# =====================================================

# ── Meta ──────────────────────────────────────────────
THEME_NAME="Catppuccin Latte"
THEME_VERSION="1.0"

# ── Base surfaces ──────────────────────────────────────
BG0="eff1f5"      # base      — deepest bg, bar bg
BG1="e6e9ef"      # mantle    — notification/panel bg
BG2="dce0e8"      # surface0  — popups, cards
BG3="bcc0cc"      # surface1  — borders, elevated

# ── Text ───────────────────────────────────────────────
FG0="4c4f69"      # text      — primary text
FG1="6c6f85"      # subtext1  — muted/secondary text

# ── Accents ────────────────────────────────────────────
ACCENT0="8839ef"    # mauve    — PRIMARY accent
ACCENT1="1e66f5"    # blue     — darker (buttons, borders)
ACCENT2="7287fd"    # lavender — mid (hover, placeholder)
ACCENT_SEC="04a5e5" # sky      — secondary accent

# ── Semantic ───────────────────────────────────────────
ORANGE="fe640b"   # peach — warnings
RED="d20f39"      # red   — errors / urgent
YELLOW="df8e1d"   # yellow — optional warm accent

# ── Rofi-specific ─────────────────────────────────────
ROFI_LIGHT_CONTRAST="eff1f5"         # base — selected text contrast pop
ROFI_ENTRY_BG="136, 57, 239, 0.07"  # entry field background tint
ROFI_PLACEHOLDER="Search the morning..."
ROFI_GRAD_DARK="7287fd"              # gradient mid stop
ROFI_GRAD_DARKER="a0a8f0"           # gradient light stop

# ── Waybar-specific ───────────────────────────────────
WB_BACKGROUND="0, 0, 0, 0"
WB_ON_SURFACE="4c4f69"               # dark text icons — readable on light bar
WB_TOOLTIP_BG="76, 79, 105, 0.95"   # dark tooltip
WB_PRIMARY="8839ef"
WB_PRIMARY_CONTAINER="136, 57, 239, 0.15"
WB_WORKSPACE_HOVER="7287fd"
WB_WARNING="fe640b"
WB_ERROR="d20f39"

# ── Transparency ──────────────────────────────────────
BG0_A90="239, 241, 245, 0.90"
BG0_A95="239, 241, 245, 0.95"
BG2_A80="220, 224, 232, 0.80"
ACCENT0_A15="136, 57, 239, 0.15"
ACCENT0_A18="136, 57, 239, 0.18"
ACCENT1_A30="30, 102, 245, 0.30"
