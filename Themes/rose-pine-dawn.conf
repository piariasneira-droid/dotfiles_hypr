# =====================================================
# ROSÉ PINE DAWN — Master Color Source
# ~/Themes/rose-pine-dawn.conf
#
# THIS is the only file you edit to change colors.
# After editing run:  bash ~/Themes/generate.sh --theme rose-pine-dawn.conf
# =====================================================

# ── Meta ──────────────────────────────────────────────
THEME_NAME="Rosé Pine Dawn"
THEME_VERSION="1.0"

# ── Base surfaces ──────────────────────────────────────
BG0="faf4ed"      # base      — deepest bg, bar bg
BG1="fffaf3"      # surface   — notification/panel bg
BG2="f2e9e1"      # overlay   — popups, cards
BG3="dfdad9"      # muted     — borders, elevated

# ── Text ───────────────────────────────────────────────
FG0="575279"      # text      — primary text
FG1="9893a5"      # subtle    — muted/secondary text

# ── Accents ────────────────────────────────────────────
ACCENT0="d7827e"    # rose     — PRIMARY accent
ACCENT1="b4637a"    # love     — darker (buttons, borders)
ACCENT2="907aa9"    # iris     — mid (hover, placeholder)
ACCENT_SEC="56949f" # foam     — secondary accent

# ── Semantic ───────────────────────────────────────────
ORANGE="ea9d34"   # gold  — warnings
RED="b4637a"      # love  — errors / urgent
YELLOW="ea9d34"   # gold  — optional warm accent

# ── Rofi-specific ─────────────────────────────────────
ROFI_LIGHT_CONTRAST="faf4ed"        # base — selected text contrast pop
ROFI_ENTRY_BG="180, 99, 122, 0.08"  # entry field background tint
ROFI_PLACEHOLDER="Search the meadow..."
ROFI_GRAD_DARK="d7827e"             # gradient mid stop
ROFI_GRAD_DARKER="c97070"           # gradient dark stop

# ── Waybar-specific ───────────────────────────────────
WB_BACKGROUND="0, 0, 0, 0"
WB_ON_SURFACE="3a3547"              # dark plum icons — readable on light bar
WB_TOOLTIP_BG="87, 82, 121, 0.95"  # dark tooltip so text stays readable
WB_PRIMARY="b4637a"
WB_PRIMARY_CONTAINER="180, 99, 122, 0.15"
WB_WORKSPACE_HOVER="d7827e"
WB_WARNING="ea9d34"
WB_ERROR="b4637a"

# ── Transparency ──────────────────────────────────────
BG0_A90="250, 244, 237, 0.90"
BG0_A95="250, 244, 237, 0.95"
BG2_A80="242, 233, 225, 0.80"
ACCENT0_A15="215, 130, 126, 0.15"
ACCENT0_A18="215, 130, 126, 0.18"
ACCENT1_A30="180, 99, 122, 0.30"
