# =====================================================
# EVERGREEN FOREST — Master Color Source
# ~/Themes/evergreen.conf
#
# THIS is the only file you edit to change colors.
# After editing run:  bash ~/Themes/generate.sh
# =====================================================

# ── Meta ──────────────────────────────────────────────
THEME_NAME="Evergreen Forest"
THEME_VERSION="1.0"

# ── Base surfaces ──────────────────────────────────────
BG0="1a2421"      # forest floor  — deepest bg, bar bg
BG1="232e2b"      # understory    — notification/panel bg
BG2="2d3b36"      # mid surface   — popups, cards
BG3="3d4f49"      # surface variant — borders, elevated

# ── Text ───────────────────────────────────────────────
FG0="d3c6aa"      # warm sand  — primary text
FG1="9da9a0"      # stone      — muted/secondary text

# ── Accents ────────────────────────────────────────────
ACCENT0="a7c080"    # canopy leaf  — PRIMARY accent
ACCENT1="4f772d"    # deep foliage — darker (buttons, borders)
ACCENT2="90a955"    # moss         — mid (hover, placeholder)
ACCENT_SEC="83c092" # morning dew  — secondary accent

# ── Semantic ───────────────────────────────────────────
ORANGE="e69875"   # autumn leaf  — warnings
RED="e67e80"      # forest berry — errors / urgent
YELLOW="dbbc7f"   # dry grass    — optional warm accent

# ── Rofi-specific ─────────────────────────────────────
ROFI_LIGHT_CONTRAST="ecf39e"        # bright lime — selected text contrast pop
ROFI_ENTRY_BG="45, 90, 39, 0.2"    # entry field background tint
ROFI_PLACEHOLDER="Search the forest..."
ROFI_GRAD_DARK="31572C"             # gradient mid stop
ROFI_GRAD_DARKER="132A13"           # gradient dark stop

# ── Waybar-specific ───────────────────────────────────
WB_BACKGROUND="0, 0, 0, 0"
WB_ON_SURFACE="ffffff"
WB_TOOLTIP_BG="0, 0, 0, 0.9"
WB_PRIMARY="4f772d"
WB_PRIMARY_CONTAINER="167, 192, 128, 0.2"
WB_WORKSPACE_HOVER="a7c080"
WB_WARNING="e69875"
WB_ERROR="e67e80"

# ── Transparency ──────────────────────────────────────
BG0_A90="26, 36, 33, 0.90"
BG0_A95="26, 36, 33, 0.95"
BG2_A80="45, 59, 54, 0.80"
ACCENT0_A15="167, 192, 128, 0.15"
ACCENT0_A18="167, 192, 128, 0.18"
ACCENT1_A30="79, 119, 45, 0.30"
