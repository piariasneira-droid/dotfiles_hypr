# =====================================================
# CATPPUCCIN MOCHA — Master Color Source
# ~/Themes/catppuccin-mocha.conf
#
# THIS is the only file you edit to change colors.
# After editing run:  bash ~/Themes/generate.sh --theme catppuccin-mocha.conf
# =====================================================

# ── Meta ──────────────────────────────────────────────
THEME_NAME="Catppuccin Mocha"
THEME_VERSION="1.0"

# ── Base surfaces ──────────────────────────────────────
BG0="1e1e2e"      # base      — deepest bg, bar bg
BG1="181825"      # mantle    — notification/panel bg
BG2="313244"      # surface0  — popups, cards
BG3="45475a"      # surface1  — borders, elevated

# ── Text ───────────────────────────────────────────────
FG0="cdd6f4"      # text      — primary text
FG1="a6adc8"      # subtext1  — muted/secondary text

# ── Accents ────────────────────────────────────────────
ACCENT0="cba6f7"    # mauve    — PRIMARY accent
ACCENT1="89b4fa"    # blue     — darker (buttons, borders)
ACCENT2="b4befe"    # lavender — mid (hover, placeholder)
ACCENT_SEC="89dceb" # sky      — secondary accent

# ── Semantic ───────────────────────────────────────────
ORANGE="fab387"   # peach — warnings
RED="f38ba8"      # red   — errors / urgent
YELLOW="f9e2af"   # yellow — optional warm accent

# ── Rofi-specific ─────────────────────────────────────
ROFI_LIGHT_CONTRAST="1e1e2e"         # base — selected text contrast pop
ROFI_ENTRY_BG="203, 166, 247, 0.1"  # entry field background tint
ROFI_PLACEHOLDER="Search the stars..."
ROFI_GRAD_DARK="7287fd"              # gradient mid stop (lavender darker)
ROFI_GRAD_DARKER="4a4b6e"           # gradient dark stop

# ── Waybar-specific ───────────────────────────────────
WB_BACKGROUND="0, 0, 0, 0"
WB_ON_SURFACE="ffffff"               # white icons on dark bar
WB_TOOLTIP_BG="0, 0, 0, 0.9"
WB_PRIMARY="cba6f7"
WB_PRIMARY_CONTAINER="203, 166, 247, 0.2"
WB_WORKSPACE_HOVER="b4befe"
WB_WARNING="fab387"
WB_ERROR="f38ba8"

# ── Transparency ──────────────────────────────────────
BG0_A90="30, 30, 46, 0.90"
BG0_A95="30, 30, 46, 0.95"
BG2_A80="49, 50, 68, 0.80"
ACCENT0_A15="203, 166, 247, 0.15"
ACCENT0_A18="203, 166, 247, 0.18"
ACCENT1_A30="137, 180, 250, 0.30"
