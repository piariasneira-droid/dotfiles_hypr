# ----------------------------------------------------- 
# Mouse Bindings (Adapted from Sway)
# ----------------------------------------------------- 

# Move and Resize (The ones you wanted to keep)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Button Bindings (Side buttons)
bind = $mainMod, mouse:275, exec, $browser      # Side Button Front (Button 9)
bind = $mainMod, mouse:277, togglefloating,     # Thumb/Gesture button

# Side Wheel (Workspace Switching)
bind = $mainMod, mouse:280, workspace, e-1      # Side wheel scroll up/left
bind = $mainMod, mouse:281, workspace, e+1      # Side wheel scroll down/right

# Central Wheel (Layout Toggling)
# Note: Hyprland handles layouts differently; this toggles floating as a proxy
bind = $mainMod, mouse:274, togglefloating,